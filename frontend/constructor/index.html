  <style>
    body:not(.u-page) .abqdRoot { padding-top: 90px !important; }
    @media (max-width: 768px) { .mobile-footer { display: none !important; } }

    html, body {
      margin: 0 !important;
      padding: 0 !important;
      background-color: var(--bg-app) !important;
      height: 100%;
    }

    :root {
      --font: "Montserrat", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      --r-card: 24px;
      --r-input: 14px;
      --r-btn: 99px;
      --avatar: 88px;
      --heroOverlap: -50px;

      --bg-app: #050507;
      --bg-panel: rgba(20, 21, 26, 0.6);
      --border-panel: rgba(255, 255, 255, 0.08);

      --page-gradient:
        radial-gradient(at 0% 0%, rgba(109, 92, 255, 0.15) 0px, transparent 50%),
        radial-gradient(at 100% 0%, rgba(255, 77, 157, 0.12) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(109, 92, 255, 0.1) 0px, transparent 50%),
        radial-gradient(at 0% 50%, rgba(255, 255, 255, 0.03) 0px, transparent 50%);

      --text-main: #ffffff;
      --text-muted: rgba(255, 255, 255, 0.5);
      --text-label: rgba(255, 255, 255, 0.7);

      --input-bg: rgba(0, 0, 0, 0.3);
      --input-border: rgba(255, 255, 255, 0.1);
      --input-focus: rgba(109, 92, 255, 0.5);

      --accent-1: #6d5cff;
      --accent-2: #ff4d9d;
      --accent-grad: linear-gradient(135deg, var(--accent-1), var(--accent-2));

      --glass-shadow: 0 20px 40px -10px rgba(0,0,0,0.5);
      --glass-blur: 24px;
      --logo-filter: invert(1) brightness(1.2);

      --p-bg: #0b0c10;
      --p-card: rgba(20, 22, 28, 0.7);
      --p-border: rgba(255,255,255,0.12);
      --p-text: #fff;
      --p-text-muted: rgba(255,255,255,0.6);
    }

    html[data-theme="soft"] {
      --bg-app: #f2f4f8;
      --bg-panel: rgba(255, 255, 255, 0.75);
      --border-panel: rgba(255, 255, 255, 0.6);

      --page-gradient:
        radial-gradient(at 10% 10%, rgba(37, 99, 235, 0.08) 0px, transparent 60%),
        radial-gradient(at 90% 20%, rgba(124, 58, 237, 0.08) 0px, transparent 60%),
        linear-gradient(180deg, #ffffff 0%, #f0f4fa 100%);

      --text-main: #1a1c23;
      --text-muted: rgba(0, 0, 0, 0.45);
      --text-label: rgba(0, 0, 0, 0.6);

      --input-bg: rgba(255, 255, 255, 0.6);
      --input-border: rgba(0, 0, 0, 0.06);
      --input-focus: rgba(37, 99, 235, 0.4);

      --accent-1: #2563eb;
      --accent-2: #7c3aed;
      --accent-grad: linear-gradient(135deg, var(--accent-1), var(--accent-2));

      --glass-shadow: 0 20px 40px -10px rgba(0,0,0,0.08);
      --logo-filter: none;

      --p-bg: #ffffff;
      --p-card: rgba(255,255,255,0.8);
      --p-border: rgba(0,0,0,0.06);
      --p-text: #1a1c23;
      --p-text-muted: rgba(0,0,0,0.5);
    }

    .abqdRoot {
      font-family: var(--font);
      background-color: var(--bg-app);
      background-image: var(--page-gradient);
      color: var(--text-main);
      min-height: 100vh;
      padding: 40px 20px;
      box-sizing: border-box;
      position: relative;
      overflow-x: hidden;
    }

    .abqdRoot * { box-sizing: border-box; outline: none; }

    .abqdRoot input,
    .abqdRoot textarea,
    .abqdRoot select,
    .abqdRoot button {
      font-family: var(--font) !important;
    }

    .wrap {
      max-width: 1280px;
      margin: 0 auto;
      position: relative;
      z-index: 2;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 32px;
      gap: 24px;
      flex-wrap: wrap;
    }

    .brand-block { display: flex; flex-direction: column; gap: 12px; }
    .brand-logo-link { display: block; width: fit-content; text-decoration: none; opacity: 0.9; transition: opacity 0.2s ease; }
    .brand-logo-link:hover { opacity: 1; }
    .brand-logo { display: block; height: auto; filter: var(--logo-filter); transition: filter 0.3s ease; }

    @media (min-width: 981px) { .brand-logo { max-height: 32px; width: auto; } }
    @media (max-width: 980px) { .brand-logo { max-height: 24px; width: auto; } }

    h1 {
      font-weight: 900;
      font-size: clamp(24px, 4vw, 36px);
      margin: 0;
      letter-spacing: -0.02em;
      background: linear-gradient(180deg, var(--text-main), var(--text-muted));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subline {
      margin-top: 8px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      max-width: 600px;
      line-height: 1.4;
    }

    .seg {
      background: var(--input-bg);
      padding: 4px;
      border-radius: 99px;
      border: 1px solid var(--border-panel);
      display: flex;
      position: relative;
      flex-wrap: wrap;
      gap: 4px;
    }

    .seg button {
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 700;
      padding: 8px 16px;
      border-radius: 99px;
      cursor: pointer;
      transition: all 0.2s ease;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .seg button.active {
      background: var(--bg-app);
      color: var(--text-main);
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    html[data-theme="soft"] .seg button.active { background: #fff; }

    .grid {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 32px;
      align-items: start;
    }

    .card {
      background: var(--bg-panel);
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      border: 1px solid var(--border-panel);
      border-radius: var(--r-card);
      box-shadow: var(--glass-shadow);
    }

    .editorCard { display: flex; flex-direction: column; overflow: hidden; }

    .cardHd {
      padding: 20px;
      border-bottom: 1px solid var(--border-panel);
      background: rgba(255,255,255,0.02);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .cardHd b {
      font-size: 18px;
      letter-spacing: -0.01em;
      font-weight: 800;
      display: block;
    }

    .sheet-handle { display: none; }
    .close-sheet-btn { display: none; }

    .tabs {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding-bottom: 4px;
      scrollbar-width: none;
    }

    .tabs::-webkit-scrollbar { display: none; }

    .tab {
      background: transparent;
      border: 1px solid transparent;
      color: var(--text-muted);
      font-weight: 700;
      font-size: 12px;
      padding: 8px 14px;
      border-radius: 12px;
      cursor: pointer;
      white-space: nowrap;
      transition: 0.2s;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .tab:hover { color: var(--text-main); background: var(--input-bg); }
    .tab.active {
      background: var(--accent-grad);
      color: #fff;
      box-shadow: 0 4px 12px rgba(109, 92, 255, 0.3);
      border: none;
    }

    .editorInner {
      flex: 1;
      overflow-y: auto !important;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 250px !important;
    }

    .pad { padding: 24px 20px; }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      color: var(--text-label);
      letter-spacing: 0.05em;
    }

    input, textarea, select {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      color: var(--text-main);
      border-radius: var(--r-input);
      padding: 14px;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.2s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    input:focus, textarea:focus, select:focus {
      border-color: var(--accent-1);
      box-shadow: 0 0 0 3px var(--input-focus);
      background: var(--bg-app);
    }

    textarea { min-height: 100px; resize: vertical; line-height: 1.5; }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }

    @media(max-width: 500px) { .row { grid-template-columns: 1fr; } }

    .help, .mini {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.4;
      font-weight: 500;
    }

    input[type="file"]::file-selector-button {
      background: var(--bg-app);
      color: var(--text-main);
      border: 1px solid var(--border-panel);
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 12px;
      margin-right: 12px;
      cursor: pointer;
      font-weight: 700;
    }

    .btnRow {
      display: flex;
      gap: 12px;
      margin-top: 24px;
      flex-wrap: wrap;
    }

    .btn {
      border: none;
      background: var(--text-main);
      color: var(--bg-app);
      font-weight: 800;
      font-size: 13px;
      padding: 12px 20px;
      border-radius: var(--r-btn);
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .btn:hover { opacity: 0.9; }
    .btn:active { transform: scale(0.98); }

    .btn.outline {
      background: transparent;
      border: 1px solid var(--border-panel);
      color: var(--text-main);
    }

    .btn.outline:hover { border-color: var(--text-muted); }

    .btn.danger {
      color: #ff4d4d;
      background: rgba(255, 77, 77, 0.1);
      border: 1px solid rgba(255,77,77,0.2);
    }

    .btn.small { padding: 6px 12px; font-size: 11px; }

    .resetLink {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 12px;
      text-decoration: underline;
      cursor: pointer;
      margin-left: auto;
      font-weight: 600;
    }

    #previewMount { position: relative; padding-top: 18px; }

    #previewCard {
      background: var(--p-bg);
      border-radius: 40px;
      border: 8px solid var(--border-panel);
      box-shadow: 0 0 0 2px rgba(0,0,0,0.1), 0 30px 60px rgba(0,0,0,0.4);
      overflow: hidden;
      position: sticky;
      top: 20px;
      min-height: 600px;
      color: var(--p-text);
    }

    #previewCard .cardHdPhone {
      background: transparent;
      border: none;
      padding: 24px;
      text-align: center;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .phone-brand-logo {
      height: 18px;
      width: auto;
      opacity: 0.7;
      filter: var(--logo-filter);
    }

    [data-edit] {
      position: relative;
      border-radius: 16px;
      transition: background 0.2s, box-shadow 0.2s;
      cursor: pointer;
    }

    @media (hover: hover) {
      [data-edit]:hover {
        box-shadow: inset 0 0 0 2px var(--border-panel);
        background: rgba(125,125,125,0.05);
      }
    }

    [data-edit]:active { background: rgba(125,125,125,0.1); }

    .hero { position: relative; padding-bottom: 20px; }
    .bannerWrap { padding: 12px; }

    .banner {
      border-radius: 24px;
      height: 180px;
      background: #2a2a2a;
      overflow: hidden;
      position: relative;
    }

    .banner img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .heroHead {
      padding: 0 24px;
      margin-top: var(--heroOverlap);
      position: relative;
      z-index: 2;
      display: flex;
      align-items: flex-end;
      gap: 16px;
    }

    .avatar {
      width: var(--avatar);
      height: var(--avatar);
      border-radius: 50%;
      border: 4px solid var(--p-bg);
      background: var(--p-bg);
      overflow: hidden;
      box-shadow: 0 10px 20px rgba(0,0,0,0.15);
    }

    .avatarInner {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #eee;
      color: #333;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .nm {
      font-size: 20px;
      font-weight: 800;
      line-height: 1.1;
      margin: 0;
      color: var(--p-text);
      pointer-events: none;
    }

    .rl {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--p-text-muted);
      margin-top: 4px;
      letter-spacing: 0.05em;
      pointer-events: none;
    }

    .about { padding: 20px 24px; }

    .aboutText {
      font-size: 14px;
      line-height: 1.6;
      color: var(--p-text);
      opacity: 0.9;
      margin-bottom: 20px;
      font-weight: 500;
      pointer-events: none;
    }

    .cta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      pointer-events: none;
    }

    .ctaBtn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 20px;
      border-radius: 16px;
      font-weight: 700;
      font-size: 13px;
      text-decoration: none;
      transition: 0.2s;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(125,125,125,0.1);
      color: var(--p-text);
    }

    .ctaBtn--glass { background: rgba(125,125,125,0.1); backdrop-filter: blur(10px); }
    .ctaBtn--metal { background: linear-gradient(180deg, #333, #111); color: #fff; border: none; }
    html[data-theme="soft"] .ctaBtn--metal { background: linear-gradient(180deg, #fff, #ddd); color: #000; }
    .ctaBtn--accent { background: var(--accent-grad); color: #fff; border: none; box-shadow: 0 8px 16px -4px rgba(109,92,255,0.4); }

    .ctaBtn--call {
      position: relative;
      font-weight: 800;
      letter-spacing: 0.01em;
      min-width: 150px;
      padding: 14px 22px;
      border-radius: 18px;
    }

    .ctaBtn--call::before {
      content: "●";
      display: inline-block;
      margin-right: 8px;
      font-size: 10px;
      vertical-align: middle;
      opacity: 0.9;
    }

    .ctaBtn--call-glass {
      background: linear-gradient(180deg, rgba(255,255,255,0.18), rgba(255,255,255,0.08));
      border: 1px solid rgba(255,255,255,0.22);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.16), 0 12px 24px rgba(0,0,0,0.18);
    }

    .ctaBtn--call-accent {
      background: var(--accent-grad);
      color: #fff;
      border: none;
      box-shadow: 0 10px 24px rgba(109,92,255,0.30), 0 4px 10px rgba(255,77,157,0.18);
    }

    .ctaBtn--call-metal {
      background: linear-gradient(180deg, #4b5563 0%, #111827 100%);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.18), 0 12px 26px rgba(0,0,0,0.28);
    }

    html[data-theme="soft"] .ctaBtn--call-glass {
      background: linear-gradient(180deg, rgba(255,255,255,0.92), rgba(245,247,250,0.72));
      border: 1px solid rgba(0,0,0,0.08);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.8), 0 10px 22px rgba(0,0,0,0.08);
    }

    html[data-theme="soft"] .ctaBtn--call-metal {
      background: linear-gradient(180deg, #ffffff 0%, #d6dbe3 100%);
      color: #111827;
      border: 1px solid rgba(0,0,0,0.10);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.9), 0 10px 22px rgba(0,0,0,0.10);
    }

    .chipsRow {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 0 24px 24px;
      pointer-events: none;
    }

    .chipA {
      padding: 8px 14px;
      border-radius: 99px;
      font-size: 12px;
      font-weight: 700;
      text-decoration: none;
      border: 1px solid var(--p-border);
      color: var(--p-text);
    }

    .chipA--accent { background: var(--accent-grad); color: #fff; border: none; }
    .chipA--outline { background: transparent; border-color: var(--p-border); opacity: 0.8; }

    .section { padding: 0 24px 24px; }

    .secTitle {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--p-text-muted);
      font-weight: 800;
      margin-bottom: 12px;
      pointer-events: none;
    }

    .list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
    }

    .item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px;
      border-radius: 16px;
      background: var(--p-card);
      border: 1px solid var(--p-border);
      color: var(--p-text);
      text-decoration: none;
    }

    .check {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--accent-grad);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 12px;
      flex-shrink: 0;
      font-weight: 800;
    }

    .itT { font-size: 14px; font-weight: 700; margin: 0; }
    .itD { font-size: 12px; opacity: 0.7; margin: 2px 0 0; font-weight: 500; }

    .grid3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      pointer-events: none;
    }

    .work {
      aspect-ratio: 1;
      border-radius: 12px;
      overflow: hidden;
      position: relative;
      background: #333;
    }

    .workImg { width: 100%; height: 100%; }
    .workImg img { width: 100%; height: 100%; object-fit: cover; }

    .workBody {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 8px;
      background: linear-gradient(transparent, rgba(0,0,0,0.8));
      color: #fff;
    }

    .workT {
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin: 0;
    }

    .footer {
      text-align: center;
      padding: 20px;
      font-size: 11px;
      opacity: 0.4;
      color: var(--p-text);
      font-weight: 600;
    }

    .hide { display: none !important; }
    .editorSpacer { height: 100px; }

    .saveStatus {
      margin-top: 16px;
      font-size: 11px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-muted);
      font-weight: 700;
    }

    .saveDot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #00c853;
      transition: background 0.3s;
    }

    [data-state="dirty"] .saveDot { background: #ffab00; }
    [data-state="saving"] .saveDot { background: #2979ff; }
    [data-state="error"] .saveDot { background: #ff4d4d; }

    .fab-edit {
      display: none;
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 999;
      background: var(--text-main);
      color: var(--bg-app);
      padding: 16px 32px;
      border-radius: 99px;
      font-weight: 800;
      font-size: 14px;
      border: none;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: transform 0.2s, opacity 0.2s;
    }

    .fab-edit.hide-fab { transform: translate(-50%, 150%); opacity: 0; }

    @media (max-width: 980px) {
      .abqdRoot { padding: 0; background: var(--p-bg); color: var(--p-text); }
      .wrap { padding: 0; }

      .top {
        padding: 16px 20px;
        margin-bottom: 0;
        background: var(--p-bg);
        position: sticky;
        top: 0;
        z-index: 50;
        border-bottom: 1px solid var(--p-border);
        align-items: center;
      }

      h1, .subline { display: none; }

      .grid { display: block; }
      #previewMount { padding: 0 0 100px 0; }

      #previewCard {
        border: none;
        border-radius: 0;
        box-shadow: none;
        top: 0;
        min-height: auto;
      }

      #previewCard .cardHdPhone { display: none; }

      .fab-edit {
        display: flex;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .editorCard {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        height: 85vh !important;
        margin: 0;
        border-radius: 32px 32px 0 0;
        z-index: 10000;
        transform: translateY(100%);
        transition: transform 0.4s cubic-bezier(0.2, 1, 0.3, 1);
        background: var(--bg-app);
        border: 1px solid var(--border-panel);
        border-bottom: none;
        box-shadow: 0 -20px 60px rgba(0,0,0,0.5);
        color: var(--text-main);
      }

      .editorCard.sheet-open { transform: translateY(0); }

      .cardHd {
        padding: 12px 20px;

  </style>
</head>
<body>

<div class="abqdRoot" data-abqd-constructor>

        <div class="card" id="previewCard">

          </div>

          <div class="hero">
            <div class="bannerWrap" data-edit="profile">
              <div class="banner" id="bannerBox">
                <div class="bannerPlh" id="bannerPlh" style="position:absolute; inset:0; display:flex; align-items:center; justify-content:center; opacity:0.3; font-weight:700; font-size:10px; text-transform:uppercase;">COVER</div>
              </div>

            <div class="about" data-edit="profile">
              <h2 class="nm" id="nameEl">Загрузка...</h2>

  <button id="fabEdit" class="fab-edit">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
    Настроить профиль
  </button>

  <div class="toastWrap" id="toastWrap"></div>

<script>
(() => {
  const clone = (obj) => {
    try { return structuredClone(obj); } catch (e) {}
    return JSON.parse(JSON.stringify(obj));
  };

  const repAll = (s, a, b) => String(s).split(String(a)).join(String(b));

  document.querySelectorAll("[data-abqd-constructor]").forEach((root) => {
    initInstance(root);
  });

  function initInstance(root) {
    const $ = (id) => root.querySelector("#" + id);

    function isMobile() {
      return window.innerWidth <= 980;
    }

    function openSheet() {
      if (!isMobile()) return;
      $("editorCard")?.classList.add("sheet-open");
      $("fabEdit")?.classList.add("hide-fab");
    }

    function closeSheet() {
      $("editorCard")?.classList.remove("sheet-open");
      $("fabEdit")?.classList.remove("hide-fab");
    }

    $("fabEdit")?.addEventListener("click", openSheet);
    $("closeSheetBtn")?.addEventListener("click", closeSheet);

    root.addEventListener("click", (e) => {
      if (!isMobile()) return;
      const editZone = e.target.closest("[data-edit]");
      if (e.target.closest(".editorCard")) return;

      if (editZone) {
        e.preventDefault();
        const targetTab = editZone.dataset.edit;
        const tabBtn = root.querySelector(`.tab[data-tab="${targetTab}"]`);
        if (tabBtn) tabBtn.click();
        openSheet();
      }
    });

    function getAuthTokenRaw() {
      return (
        localStorage.getItem("abqd_token") ||
        localStorage.getItem("token") ||
        localStorage.getItem("auth_token") ||
        localStorage.getItem("access_token") ||
        ""
      );
    }

    function hashUserScope(str) {
      str = String(str || "anon");
      let h = 2166136261;
      for (let i = 0; i < str.length; i++) {
        h ^= str.charCodeAt(i);
        h = Math.imul(h, 16777619);
      }
      return (h >>> 0).toString(36);
    }

    function getUserScope() {
      const tok = getAuthTokenRaw();
      if (!tok) return "";
      return hashUserScope(tok);
    }

    function getConstructorStorageKey() {
      const scope = getUserScope();
      return scope ? "abqd_constructor_" + scope : "";
    }

    function getActiveSlugStorageKey() {
      const scope = getUserScope();
      return scope ? "abqd_active_slug_" + scope : "";
    }

    const KEY = getConstructorStorageKey();
    const ACTIVE_SLUG_KEY = getActiveSlugStorageKey();

    const STYLE_LABELS = {
      glass: "Стекло",
      accent: "Акцент",
      metal: "Металл",
      outline: "Обводка"
    };

    const STYLE_SETS_CTA = {
      dark: ["glass", "accent", "metal"],
      soft: ["glass", "accent", "metal"]
    };

    const STYLE_SETS_CHIPS = {
      dark: ["outline", "accent"],
      soft: ["outline", "accent"]
    };

    const THEME_ACCENT = {
      dark: ["#ff4d9d", "#6d5cff"],
      soft: ["#2563eb", "#7c3aed"]
    };

    const ACCENT_PRESETS = {
      brand: (theme) => THEME_ACCENT[theme] || THEME_ACCENT.soft,
      royal: () => ["#2563eb", "#7c3aed"],
      ruby: () => ["#ef4444", "#a855f7"],
      graphite: () => ["#64748b", "#0f172a"]
    };

    function clean(s) {
      return String(s == null ? "" : s).trim();
    }

    function escapeHtml(s) {
      s = String(s == null ? "" : s);
      s = repAll(s, "&", "&amp;");
      s = repAll(s, "<", "&lt;");
      s = repAll(s, ">", "&gt;");
      s = repAll(s, '"', "&quot;");
      s = repAll(s, "'", "&#039;");
      return s;
    }

    function hexToRgb(hex) {
      hex = clean(hex);
      if (!hex) return null;
      if (hex[0] === "#") hex = hex.slice(1);
      if (hex.length === 3) hex = hex.split("").map((c) => c + c).join("");
      if (hex.length !== 6) return null;
      const n = parseInt(hex, 16);
      if (!Number.isFinite(n)) return null;
      return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
    }

    function setAccentVars(c1, c2) {
      const theme = state.theme || "soft";
      const dflt = THEME_ACCENT[theme] || THEME_ACCENT.soft;
      const safe1 = clean(c1) || dflt[0];
      const safe2 = clean(c2) || dflt[1];
      const r1 = hexToRgb(safe1) || hexToRgb(dflt[0]);
      const r2 = hexToRgb(safe2) || hexToRgb(dflt[1]);
      document.documentElement.style.setProperty("--accent-1", safe1);
      document.documentElement.style.setProperty("--accent-2", safe2);
      document.documentElement.style.setProperty("--ctaAcc1rgb", r1.join(","));
      document.documentElement.style.setProperty("--ctaAcc2rgb", r2.join(","));
    }

    function applyButtonThemeVars() {
      const theme = state.theme || "soft";
      const preset = state.accentPreset || "brand";
      let pair;

      if (preset === "custom") {
        pair = [state.accentC1, state.accentC2];
      } else {
        const fn = ACCENT_PRESETS[preset] || ACCENT_PRESETS.brand;
        pair = fn(theme);
      }

      setAccentVars(pair[0], pair[1]);

      const customRow = $("accentCustomRow");
      if (customRow) {
        customRow.classList.toggle("hide", (preset !== "custom") && (clean(state.ctaTheme) !== "accent"));
      }
    }

    const defaultState = {
      slug: "ivan-ivanov",
      theme: "dark",
      ctaTheme: "auto",
      callButtonStyle: "metal",
      accentPreset: "brand",
      accentC1: "#2563eb",
      accentC2: "#7c3aed",
      metalPreset: "aluminum",
      fullName: "Иванов Иван",
      role: "CREATIVE DIRECTOR",
      about: "Создаю цифровые продукты и архитектурные решения. Свяжитесь со мной для сотрудничества.",
      avatarDataUrl: "",
      bannerDataUrl: "",
      logoDataUrl: "",
      logoLink: "https://abqd.ru",
      callPhone: "",
      buttons: [{ label: "Telegram", url: "https://t.me/", style: "accent" }],
      pointsTitle: "Ссылки",
      points: [
        { title: "Мой сайт", text: "", url: "" },
        { title: "Портфолио PDF", text: "", url: "" }
      ],
      galleryTitle: "Работы",
      gallery: [
        { title: "Проект А", text: "Описание", img: "", url: "" },
        { title: "Проект Б", text: "Описание", img: "", url: "" }
      ],
      chips: [
        { label: "TG", url: "https://t.me/", style: "outline" },
        { label: "Mail", url: "mailto:", style: "outline" }
      ]
    };

    const storageGet = () => {
      try { return KEY ? localStorage.getItem(KEY) : null; }
      catch (e) { return null; }
    };

    const storageSet = (v) => {
      try {
        if (!KEY) return false;
        localStorage.setItem(KEY, v);
        return true;
      } catch (e) { return false; }
    };

    const activeSlugGet = () => {
      try { return ACTIVE_SLUG_KEY ? localStorage.getItem(ACTIVE_SLUG_KEY) : null; }
      catch (e) { return null; }
    };

    const activeSlugSet = (v) => {
      try {
        if (!ACTIVE_SLUG_KEY) return false;
        localStorage.setItem(ACTIVE_SLUG_KEY, v);
        return true;
      } catch (e) { return false; }
    };

    const normUrl = (u) => {
      u = clean(u);
      if (!u) return "";
      const low = u.toLowerCase();
      if (
        low.startsWith("http://") ||
        low.startsWith("https://") ||
        low.startsWith("mailto:") ||
        low.startsWith("tel:") ||
        low.startsWith("tg://")
      ) return u;
      return "https://" + u;
    };

    const contactUrl = (u) => {
      u = clean(u);
      if (!u) return "";
      const low = u.toLowerCase();

      if (
        low.startsWith("http://") ||
        low.startsWith("https://") ||
        low.startsWith("mailto:") ||
        low.startsWith("tel:") ||
        low.startsWith("tg://")
      ) return u;

      if (low.includes("@") && !low.includes(" ")) return "mailto:" + u;

      const hasDigit = /\d/.test(u);
      if (hasDigit && u.length > 6 && !u.includes("http")) {
        const digits = u.replace(/[^\d+]/g, "");
        return "tel:" + digits;
      }

      return "https://" + u;
    };

    const normalizeSlug = (s) => {
      s = clean(s).toLowerCase();
      if (!s) return "";
      return s.replace(/[^a-z0-9\-\.]/g, "-").replace(/-+/g, "-").replace(/^-|-$/g, "");
    };

    async function fetchWithTimeout(url, options = {}, timeout = 8000) {
      const controller = new AbortController();
      const id = setTimeout(() => controller.abort(), timeout);
      try {
        return await fetch(url, { ...options, signal: controller.signal });
      } finally {
        clearTimeout(id);
      }
    }

    function getAuthHeaders(extra = {}) {
      const headers = { ...extra };
      const token = getAuthTokenRaw();
      if (token) headers["Authorization"] = "Bearer " + token;
      return headers;
    }

    async function uploadMediaViaAPI(file, kind = "avatar") {
      if (!file) return "";

      const statusEl = $("saveStatusText");
      if (statusEl) statusEl.innerHTML = "Загрузка фото...";

      const fd = new FormData();
      fd.append("file", file);
      fd.append("kind", kind);

      const currentSlug = normalizeSlug(state.slug || activeSlugGet() || "");
      if (currentSlug) fd.append("slug", currentSlug);

      try {
        const res = await fetchWithTimeout("/api/v1/media/upload", {
          method: "POST",
          headers: getAuthHeaders(),
          credentials: "include",
          body: fd
        });

        if (res.ok) {
          const data = await res.json();
          if (statusEl) statusEl.innerHTML = "Фото загружено";
          return data.public_url || data.url || "";
        }

        const errText = await res.text();
        console.error("Upload error:", errText);
        if (statusEl) statusEl.innerHTML = "Ошибка API при загрузке фото";
        alert("Сервер отклонил фото: " + errText);
      } catch (e) {
        console.error("Network error:", e);
        if (statusEl) statusEl.innerHTML = "Ошибка сети при загрузке";
      }

      return "";
    }

    function mapStateFromAny(rawState = {}) {
      const profile = rawState.profile || {};
      return {
        slug: normalizeSlug(rawState.slug || "") || "",
        theme: rawState.theme || "dark",
        ctaTheme: rawState.ctaTheme || "auto",
        callButtonStyle: rawState.callButtonStyle || "metal",
        accentPreset: rawState.accentPreset || "brand",
        accentC1: rawState.accentC1 || "#2563eb",
        accentC2: rawState.accentC2 || "#7c3aed",
        metalPreset: rawState.metalPreset || "aluminum",
        fullName: rawState.fullName || profile.name || "",
        role: rawState.role || profile.role || "",
        about: rawState.about || profile.about || "",
        avatarDataUrl: rawState.avatarDataUrl || profile.avatar || rawState.avatarUrl || "",
        bannerDataUrl: rawState.bannerDataUrl || profile.banner || rawState.bannerUrl || "",
        logoDataUrl: rawState.logoDataUrl || profile.logo || rawState.logoUrl || "",
        logoLink: rawState.logoLink || profile.logoLink || "",
        callPhone: rawState.callPhone || profile.phone || "",
        buttons: Array.isArray(rawState.buttons) ? rawState.buttons : [],
        pointsTitle: rawState.pointsTitle || "Ссылки",
        points: Array.isArray(rawState.points) ? rawState.points : [],
        galleryTitle: rawState.galleryTitle || "Работы",
        gallery: Array.isArray(rawState.gallery) ? rawState.gallery : [],
        chips: Array.isArray(rawState.chips) ? rawState.chips : []
      };
    }

    async function loadDraftFromCloud() {
      try {
        const res = await fetchWithTimeout(`/api/v1/constructor/me?t=${Date.now()}`, {
          method: "GET",
          headers: getAuthHeaders(),
          credentials: "include"
        });

        if (!res.ok) return null;

        const raw = await res.json();
        const st = raw?.state || {};
        if (!st || typeof st !== "object") return null;
        return mapStateFromAny(st);
      } catch (e) {
        return null;
      }
    }

    async function saveDraftToCloud(dataObj) {
      try {
        const res = await fetchWithTimeout("/api/v1/constructor/me", {
          method: "PUT",
          headers: getAuthHeaders({ "Content-Type": "application/json" }),
          credentials: "include",
          body: JSON.stringify(clone(dataObj))
        });
        return res.ok;
      } catch (e) {
        return false;
      }
    }

    async function loadPublishedProfileFromCloud() {
      try {
        const typedSlug = normalizeSlug($("slug")?.value || "");
        const rememberedSlug = normalizeSlug(activeSlugGet() || "");
        const currentSlug = typedSlug || rememberedSlug;
        if (!currentSlug) return null;

        const res = await fetchWithTimeout(`/api/v1/profile/${currentSlug}?t=${Date.now()}`, {
          method: "GET",
          credentials: "include"
        });

        if (!res.ok) return null;

        const raw = await res.json();
        if (raw?.slug) activeSlugSet(raw.slug);

        return mapStateFromAny({
          ...(raw.state || {}),
          slug: raw.slug || currentSlug
        });
      } catch (e) {
        return null;
      }
    }

    function toPublishedPayload(dataObj) {
      const slug = normalizeSlug(dataObj.slug || "") || "profile";
      return {
        state: {
          slug,
          theme: dataObj.theme || "dark",
          ctaTheme: dataObj.ctaTheme || "auto",
          callButtonStyle: dataObj.callButtonStyle || "metal",
          accentPreset: dataObj.accentPreset || "brand",
          accentC1: dataObj.accentC1 || "#2563eb",
          accentC2: dataObj.accentC2 || "#7c3aed",
          metalPreset: dataObj.metalPreset || "aluminum",
          pointsTitle: dataObj.pointsTitle || "Ссылки",
          galleryTitle: dataObj.galleryTitle || "Работы",
          profile: {
            name: dataObj.fullName || "",
            role: dataObj.role || "",
            about: dataObj.about || "",
            phone: dataObj.callPhone || "",
            avatar: dataObj.avatarDataUrl || "",
            banner: dataObj.bannerDataUrl || "",
            logo: dataObj.logoDataUrl || "",
            logoLink: dataObj.logoLink || ""
          },
          buttons: dataObj.buttons || [],
          chips: dataObj.chips || [],
          points: dataObj.points || [],
          gallery: dataObj.gallery || []
        }
      };
    }

    async function publishProfileToCloud(dataObj) {
      try {
        const slug = normalizeSlug(dataObj.slug || "") || "profile";
        activeSlugSet(slug);

        const res = await fetchWithTimeout(`/api/v1/profile/${slug}`, {
          method: "PUT",
          headers: getAuthHeaders({ "Content-Type": "application/json" }),
          credentials: "include",
          body: JSON.stringify(toPublishedPayload({ ...dataObj, slug }))
        });

        return res.ok;
      } catch (e) {
        return false;
      }
    }

    let state = clone(defaultState);
    let dirty = false;
    let saveTimer = null;
    const AUTOSAVE_MS = 1200;

    const syncHeights = () => {
      if (isMobile()) {
        root.style.setProperty("--matchH", "auto");
        return;
      }
      const pv = $("previewCard");
      if (!pv) return;
      const h = Math.max(0, pv.getBoundingClientRect().height || 0);
      if (h > 0) root.style.setProperty("--matchH", Math.round(h) + "px");
    };

    const setSaveStatus = (mode, note) => {
      const box = $("saveStatus");
      const tx = $("saveStatusText");
      if (!box || !tx) return;
      box.dataset.state = mode;
      tx.textContent = note;
    };

    async function persistNow() {
      storageSet(JSON.stringify(state));
      dirty = false;
      setSaveStatus("saving", "Синхронизация черновика с сервером...");

      const ok = await saveDraftToCloud(state);
      if (ok) {
        setSaveStatus("saved", "Черновик синхронизирован");
      } else {
        setSaveStatus("error", "Черновик сохранён локально");
      }

      return ok;
    }

    function persist() {
      dirty = true;
      setSaveStatus("dirty", "Есть несохранённые изменения...");
      if (saveTimer) clearTimeout(saveTimer);
      saveTimer = window.setTimeout(() => { persistNow(); }, AUTOSAVE_MS);
    }

    window.addEventListener("beforeunload", () => {
      if (dirty) storageSet(JSON.stringify(state));
    });

    function toast(title, subtitle) {
      const wrap = $("toastWrap");
      if (!wrap) return;
      const t = document.createElement("div");
      t.className = "toast";
      t.innerHTML = "<div>" + escapeHtml(title) + "</div>" + (subtitle ? "<small>" + escapeHtml(subtitle) + "</small>" : "");
      wrap.appendChild(t);
      setTimeout(() => t.remove(), 2500);
    }

    function safeOn(id, evt, handler) {
      const el = $(id);
      if (!el) return;
      el.addEventListener(evt, handler);
    }

    function sanitizeButtonStyles() {
      const allowedBtn = new Set(["glass", "accent", "metal"]);
      state.buttons = Array.isArray(state.buttons) ? state.buttons : [];
      state.buttons.forEach((b) => {
        if (b && !allowedBtn.has(b.style)) b.style = "glass";
      });

      state.chips = Array.isArray(state.chips) ? state.chips : [];
      state.chips.forEach((c) => {
        if (c && (c.style === "glass" || c.style === "metal")) c.style = "outline";
      });

      if (!["glass", "accent", "metal"].includes(state.callButtonStyle)) {
        state.callButtonStyle = "metal";
      }
    }

    function setTheme(t) {
      if (t !== "dark" && t !== "soft") t = "soft";
      state.theme = t;
      document.documentElement.setAttribute("data-theme", t);
      $("themeSeg")?.querySelectorAll("button").forEach((b) => {
        b.classList.toggle("active", b.dataset.theme === t);
      });
      applyButtonThemeVars();
    }

    function setCtaTheme(v) {
      v = clean(v || "auto");
      if (!["auto", "glass", "metal", "accent"].includes(v)) v = "auto";
      state.ctaTheme = v;

      if (v === "accent" && state.accentPreset !== "custom") {
        const theme = state.theme || "soft";
        const fn = ACCENT_PRESETS[state.accentPreset] || ACCENT_PRESETS.brand;
        const pair = fn(theme);
        state.accentPreset = "custom";
        state.accentC1 = pair[0];
        state.accentC2 = pair[1];
      }

      $("ctaThemeSeg")?.querySelectorAll("button").forEach((b) => {
        b.classList.toggle("active", b.dataset.ctatheme === v);
      });

      applyButtonThemeVars();
      renderButtonsList();
      renderContactsList();
      renderCallStyleSeg();
    }

    function renderCallStyleSeg() {
      $("callStyleSeg")?.querySelectorAll("button").forEach((b) => {
        b.classList.toggle("active", b.dataset.callstyle === state.callButtonStyle);
      });
    }

    function resolveCtaStyle(styleRaw) {
      styleRaw = clean(styleRaw) || "glass";
      if (!["glass", "metal", "accent"].includes(styleRaw)) return "glass";
      return styleRaw;
    }

    function resolveChipStyle(styleRaw) {
      styleRaw = clean(styleRaw) || "outline";
      if (styleRaw === "glass" || styleRaw === "metal") styleRaw = "outline";
      if (!["outline", "accent"].includes(styleRaw)) return "outline";
      return styleRaw;
    }

    function buildProfileUrl() {
      const slug = normalizeSlug(state.slug || "");
      return "https://app.abqd.ru/u/" + slug;
    }

    function renderPreview() {
      if ($("nameEl")) $("nameEl").textContent = state.fullName || "Имя Фамилия";
      if ($("roleEl")) $("roleEl").textContent = state.role || "Должность";
      if ($("aboutEl")) $("aboutEl").textContent = state.about || "";

      if ($("slug")) $("slug").value = state.slug || "";
      if ($("slugFull")) $("slugFull").textContent = state.slug || "...";

      const bannerBox = $("bannerBox");
      const bannerPlh = $("bannerPlh");

      if (bannerBox) {
        bannerBox.querySelectorAll("img").forEach((x) => x.remove());
        bannerBox.querySelectorAll(".bannerLogo").forEach((x) => x.remove());

        if (state.bannerDataUrl) {
          const img = document.createElement("img");
          img.src = state.bannerDataUrl;
          bannerBox.appendChild(img);
          bannerPlh?.classList.add("hide");
        } else {
          bannerPlh?.classList.remove("hide");
        }

        if (state.logoDataUrl) {
          const a = document.createElement("a");
          a.className = "bannerLogo";
          a.href = normUrl(state.logoLink) || "#";
          a.target = "_blank";
          a.style.position = "absolute";
          a.style.top = "16px";
          a.style.right = "16px";
          a.style.display = "block";
          a.style.maxHeight = "42px";
          a.style.zIndex = "3";

          const im = document.createElement("img");
          im.src = state.logoDataUrl;
          im.style.maxHeight = "42px";
          im.style.width = "auto";
          im.style.display = "block";

          a.appendChild(im);
          bannerBox.appendChild(a);
        }
      }

      const av = $("avatarBox");
      if (av) {
        av.innerHTML = "";
        const inner = document.createElement("div");
        inner.className = "avatarInner";

        if (state.avatarDataUrl) {
          const img = document.createElement("img");
          img.src = state.avatarDataUrl;
          inner.appendChild(img);
        } else {
          const letter = (state.fullName || "A").slice(0, 1).toUpperCase();
          inner.innerHTML = `<span class="fallback" style="font-size:24px; font-weight:800;">${escapeHtml(letter)}</span>`;
        }

        av.appendChild(inner);
      }

      const forcedButtonsStyle = ["glass", "metal", "accent"].includes(state.ctaTheme) ? state.ctaTheme : "";
      const phoneStyle = resolveCtaStyle(state.callButtonStyle || (forcedButtonsStyle || "metal"));

      const cta = $("ctaRow");
      if (cta) {
        cta.innerHTML = "";

        const phone = clean(state.callPhone);
        if (phone) {
          const a = document.createElement("a");
          a.textContent = "Позвонить";
          a.href = contactUrl(phone);
          a.className = "ctaBtn ctaBtn--call ctaBtn--call-" + phoneStyle;
          cta.appendChild(a);
        }

        (state.buttons || []).slice(0, 6).forEach((btn) => {
          if (!btn || !clean(btn.label)) return;
          const a = document.createElement("a");
          a.textContent = btn.label;
          a.href = normUrl(btn.url);
          a.target = "_blank";
          const st = forcedButtonsStyle || resolveCtaStyle(btn.style);
          a.className = "ctaBtn ctaBtn--" + st;
          cta.appendChild(a);
        });
      }

      const chipPreviewBtn = $("callPhoneChip");
      if (chipPreviewBtn) chipPreviewBtn.textContent = "Позвонить";

      const contactsPreview = $("contactsPreview");
      if (contactsPreview) {
        contactsPreview.innerHTML = "";
        (state.chips || []).slice(0, 20).forEach((c) => {
          const lbl = clean(c?.label);
          const url = clean(c?.url);
          if (!lbl && !url) return;

          const a = document.createElement("a");
          const st = resolveChipStyle(c.style);
          a.className = "chipA chipA--" + st;
          a.textContent = lbl || url;
          a.href = contactUrl(url);
          a.target = "_blank";
          contactsPreview.appendChild(a);
        });

        $("contactsSection")?.classList.toggle("hide", contactsPreview.children.length === 0);
      }

      const pointsPreview = $("pointsPreview");
      if (pointsPreview) {
        pointsPreview.innerHTML = "";
        if ($("pointsTitleEl")) $("pointsTitleEl").textContent = state.pointsTitle || "Links";

        (state.points || []).slice(0, 12).forEach((p) => {
          if (!p || (!p.title && !p.url)) return;
          const node = document.createElement("a");
          node.className = "item";
          node.href = normUrl(p.url);
          node.target = "_blank";
          node.innerHTML = `
            <div class="check">✓</div>
            <div>
              <p class="itT">${escapeHtml(p.title || p.url)}</p>
              <p class="itD">${escapeHtml(p.text || "")}</p>
            </div>
          `;
          pointsPreview.appendChild(node);
        });

        $("pointsSection")?.classList.toggle("hide", pointsPreview.children.length === 0);
      }

      const galleryPreview = $("galleryPreview");
      if (galleryPreview) {
        galleryPreview.innerHTML = "";
        if ($("galleryTitleEl")) $("galleryTitleEl").textContent = state.galleryTitle || "Gallery";

        (state.gallery || []).slice(0, 12).forEach((g) => {
          if (!g || (!g.img && !g.title)) return;
          const card = document.createElement("div");
          card.className = "work";
          if (g.img) card.innerHTML = `<div class="workImg"><img src="${escapeHtml(g.img)}" alt=""></div>`;
          card.innerHTML += `<div class="workBody"><p class="workT">${escapeHtml(g.title || "")}</p></div>`;
          galleryPreview.appendChild(card);
        });

        $("gallerySection")?.classList.toggle("hide", galleryPreview.children.length === 0);
      }

      syncHeights();
    }

    function renderStyleOptions(theme, kind) {
      const t = theme || "soft";
      const list = kind === "chips" ? STYLE_SETS_CHIPS[t] : STYLE_SETS_CTA[t];
      return list.map((v) => `<option value="${v}">${STYLE_LABELS[v] || v}</option>`).join("");
    }

    function renderButtonsList() {
      const bl = $("buttonsList");
      if (!bl) return;

      const opts = renderStyleOptions(state.theme, "cta");
      bl.innerHTML = "";

      (state.buttons || []).forEach((b, i) => {
        const div = document.createElement("div");
        div.className = "card pad";
        div.style.marginBottom = "10px";
        div.innerHTML = `
          <div class="row">
            <div><label>Текст</label><input data-b="label" data-i="${i}" value="${escapeHtml(b.label || "")}"></div>
            <div><label>URL</label><input data-b="url" data-i="${i}" value="${escapeHtml(b.url || "")}"></div>
          </div>
          <div class="row">
            <div><label>Стиль</label><select data-b="style" data-i="${i}">${opts}</select></div>
            <div style="text-align:right; align-self:end"><button class="btn danger small" data-act="rmButton" data-i="${i}">Del</button></div>
          </div>
        `;
        bl.appendChild(div);
        div.querySelector("select").value = resolveCtaStyle(b.style);
      });

      syncHeights();
    }

    function renderContactsList() {
      const cl = $("contactsList");
      if (!cl) return;

      const opts = renderStyleOptions(state.theme, "chips");
      cl.innerHTML = "";

      (state.chips || []).forEach((c, i) => {
        const div = document.createElement("div");
        div.className = "card pad";
        div.style.marginBottom = "10px";
        div.innerHTML = `
          <div class="row">
            <div><label>Label</label><input data-c="label" data-i="${i}" value="${escapeHtml(c.label || "")}"></div>
            <div><label>Link/Phone</label><input data-c="url" data-i="${i}" value="${escapeHtml(c.url || "")}"></div>
          </div>
          <div class="row">
            <div><label>Стиль</label><select data-c="style" data-i="${i}">${opts}</select></div>
            <div style="text-align:right; align-self:end"><button class="btn danger small" data-act="rmChip" data-i="${i}">Del</button></div>
          </div>
        `;
        cl.appendChild(div);
        div.querySelector("select").value = resolveChipStyle(c.style);
      });

      syncHeights();
    }

    function renderPointsList() {
      const pl = $("pointsList");
      if (!pl) return;

      pl.innerHTML = "";

      (state.points || []).forEach((p, i) => {
        const div = document.createElement("div");
        div.className = "card pad";
        div.style.marginBottom = "10px";
        div.innerHTML = `
          <div class="row">
            <div><label>Title</label><input data-p="title" data-i="${i}" value="${escapeHtml(p.title || "")}"></div>
            <div><label>URL</label><input data-p="url" data-i="${i}" value="${escapeHtml(p.url || "")}"></div>
          </div>
          <div><label>Desc</label><textarea data-p="text" data-i="${i}" style="min-height:60px">${escapeHtml(p.text || "")}</textarea></div>
          <div style="text-align:right; margin-top:10px"><button class="btn danger small" data-act="rmPoint" data-i="${i}">Del</button></div>
        `;
        pl.appendChild(div);
      });

      syncHeights();
    }

    function renderGalleryList() {
      const gl = $("galleryList");
      if (!gl) return;

      gl.innerHTML = "";

      (state.gallery || []).forEach((g, i) => {
        const div = document.createElement("div");
        div.className = "card pad";
        div.style.marginBottom = "10px";
        div.innerHTML = `
          <div class="row">
            <div><label>Название</label><input data-g="title" data-i="${i}" value="${escapeHtml(g.title || "")}"></div>
            <div><label>Фото</label><input type="file" data-gfile="1" data-i="${i}"></div>
          </div>
          <div style="text-align:right"><button class="btn danger small" data-act="rmGallery" data-i="${i}">Del</button></div>
        `;
        gl.appendChild(div);
      });

      syncHeights();
    }

    function renderAllLists() {
      renderButtonsList();
      renderContactsList();
      renderPointsList();
      renderGalleryList();
      renderCallStyleSeg();
    }

    function syncFieldsFromState() {
      if ($("fullName")) $("fullName").value = state.fullName || "";
      if ($("role")) $("role").value = state.role || "";
      if ($("about")) $("about").value = state.about || "";
      if ($("aboutCount")) $("aboutCount").textContent = String((state.about || "").length);
      if ($("slug")) $("slug").value = state.slug || "";
      if ($("callPhone")) $("callPhone").value = state.callPhone || "";
      if ($("logoLink")) $("logoLink").value = state.logoLink || "";

      if ($("avatarUrl")) $("avatarUrl").value = state.avatarDataUrl || "";
      if ($("bannerUrl")) $("bannerUrl").value = state.bannerDataUrl || "";
      if ($("logoUrl")) $("logoUrl").value = state.logoDataUrl || "";

      if ($("pointsTitle")) $("pointsTitle").value = state.pointsTitle || "";
      if ($("galleryTitle")) $("galleryTitle").value = state.galleryTitle || "";

      if ($("accentPreset")) $("accentPreset").value = state.accentPreset || "brand";
      if ($("accentC1")) $("accentC1").value = state.accentC1 || "#2563eb";
      if ($("accentC2")) $("accentC2").value = state.accentC2 || "#7c3aed";

      $("themeSeg")?.querySelectorAll("button").forEach((b) => {
        b.classList.toggle("active", b.dataset.theme === (state.theme || "soft"));
      });

      syncHeights();
    }

    safeOn("themeSeg", "click", (e) => {
      const b = e.target.closest("button[data-theme]");
      if (!b) return;
      setTheme(b.dataset.theme);
      persist();
      renderPreview();
    });

    safeOn("ctaThemeSeg", "click", (e) => {
      const b = e.target.closest("button[data-ctatheme]");
      if (!b) return;
      setCtaTheme(b.dataset.ctatheme);
      persist();
      renderPreview();
    });

    root.addEventListener("click", (e) => {
      const b = e.target.closest("#callStyleSeg button[data-callstyle]");
      if (!b) return;
      state.callButtonStyle = b.dataset.callstyle;
      renderCallStyleSeg();
      persist();
      renderPreview();
    });

    safeOn("tabs", "click", (e) => {
      const t = e.target.closest(".tab");
      if (!t) return;

      root.querySelectorAll(".tab").forEach((x) => x.classList.remove("active"));
      t.classList.add("active");

      const n = t.dataset.tab;
      ["profile","buttons","contacts","points","gallery"].forEach((k) => {
        $("tab-" + k)?.classList.toggle("hide", k !== n);
      });

      syncHeights();
    });

    root.addEventListener("input", (e) => {
      const el = e.target;

      if (el.id === "fullName") state.fullName = el.value;
      if (el.id === "role") state.role = el.value;
      if (el.id === "about") {
        state.about = el.value;
        if ($("aboutCount")) $("aboutCount").textContent = String(el.value.length);
      }
      if (el.id === "slug") {
        state.slug = normalizeSlug(el.value);
        el.value = state.slug;
      }
      if (el.id === "callPhone") state.callPhone = el.value;
      if (el.id === "logoLink") state.logoLink = el.value;

      if (el.id === "avatarUrl") state.avatarDataUrl = clean(el.value);
      if (el.id === "bannerUrl") state.bannerDataUrl = clean(el.value);
      if (el.id === "logoUrl") state.logoDataUrl = clean(el.value);

      if (el.id === "pointsTitle") state.pointsTitle = el.value;
      if (el.id === "galleryTitle") state.galleryTitle = el.value;

      if (el.id === "accentC1") { state.accentC1 = el.value; applyButtonThemeVars(); }
      if (el.id === "accentC2") { state.accentC2 = el.value; applyButtonThemeVars(); }

      if (el.dataset.b) state.buttons[el.dataset.i][el.dataset.b] = el.value;
      if (el.dataset.c) state.chips[el.dataset.i][el.dataset.c] = el.value;
      if (el.dataset.p) state.points[el.dataset.i][el.dataset.p] = el.value;
      if (el.dataset.g) state.gallery[el.dataset.i][el.dataset.g] = el.value;

      persist();
      renderPreview();
    });

    root.addEventListener("change", async (e) => {
      const el = e.target;

      if (el.id === "avatarFile") state.avatarDataUrl = await uploadMediaViaAPI(el.files?.[0], "avatar");
      if (el.id === "bannerFile") state.bannerDataUrl = await uploadMediaViaAPI(el.files?.[0], "banner");
      if (el.id === "logoFile") state.logoDataUrl = await uploadMediaViaAPI(el.files?.[0], "logo");
      if (el.dataset.gfile) state.gallery[el.dataset.i].img = await uploadMediaViaAPI(el.files?.[0], "gallery");

      if (el.dataset.b === "style") state.buttons[el.dataset.i].style = el.value;
      if (el.dataset.c === "style") state.chips[el.dataset.i].style = el.value;

      if (el.id === "accentPreset") {
        state.accentPreset = el.value;
        applyButtonThemeVars();
      }

      persist();
      renderPreview();
      syncFieldsFromState();
    });

    root.addEventListener("click", (e) => {
      const b = e.target.closest("button[data-act]");
      if (!b) return;

      const i = Number(b.dataset.i);

      if (b.dataset.act === "rmButton") { state.buttons.splice(i, 1); renderButtonsList(); }
      if (b.dataset.act === "rmChip") { state.chips.splice(i, 1); renderContactsList(); }
      if (b.dataset.act === "rmPoint") { state.points.splice(i, 1); renderPointsList(); }
      if (b.dataset.act === "rmGallery") { state.gallery.splice(i, 1); renderGalleryList(); }

      persist();
      renderPreview();
    });

    safeOn("addButton", "click", () => {
      state.buttons.push({ label: "New", url: "", style: "glass" });
      renderButtonsList();
      persist();
      renderPreview();
    });

    safeOn("addChip", "click", () => {
      state.chips.push({ label: "Link", url: "", style: "outline" });
      renderContactsList();
      persist();
      renderPreview();
    });

    safeOn("addPoint", "click", () => {
      state.points.push({ title: "Link", url: "", text: "" });
      renderPointsList();
      persist();
      renderPreview();
    });

    safeOn("addGallery", "click", () => {
      state.gallery.push({ title: "Work", img: "", text: "", url: "" });
      renderGalleryList();
      persist();
      renderPreview();
    });

    safeOn("save", "click", async () => {
      state.slug = normalizeSlug(state.slug || "") || "profile";
      if ($("slug")) $("slug").value = state.slug;

      await persistNow();

      setSaveStatus("saving", "Публикация профиля...");
      const ok = await publishProfileToCloud(state);

      if (ok) {
        setSaveStatus("saved", "Профиль опубликован");
        toast("Опубликовано", buildProfileUrl());
      } else {
        setSaveStatus("error", "Ошибка публикации профиля");
        toast("Ошибка", "Не удалось опубликовать профиль");
      }

      closeSheet();
      renderPreview();
    });

    safeOn("reset", "click", async () => {
      if (!confirm("Сбросить все?")) return;
      state = clone(defaultState);
      syncFieldsFromState();
      renderAllLists();
      renderPreview();
      await persistNow();
    });

    safeOn("profileLink", "click", () => {
      const url = buildProfileUrl();
      navigator.clipboard.writeText(url).then(() => toast("Скопировано", url));
    });

    async function init() {
      setSaveStatus("saving", "Загрузка данных...");

      let localData = null;
      try {
        const raw = storageGet();
        localData = raw ? JSON.parse(raw) : null;
      } catch (e) {
        localData = null;
      }

      const draftData = await loadDraftFromCloud();
      const publishedData = draftData ? null : await loadPublishedProfileFromCloud();

      const mergedData = draftData || localData || publishedData || clone(defaultState);

      state = {
        ...clone(defaultState),
        ...mergedData
      };

      state.slug = normalizeSlug(state.slug || defaultState.slug) || defaultState.slug;

      if (draftData) storageSet(JSON.stringify(state));

      sanitizeButtonStyles();
      setTheme(state.theme || "dark");
      syncFieldsFromState();
      setCtaTheme(state.ctaTheme || "auto");
      renderAllLists();
      renderPreview();

      if (draftData) {
        setSaveStatus("saved", "Черновик синхронизирован");
      } else if (localData) {
        setSaveStatus("saved", "Загружено локально");
      } else if (publishedData) {
        setSaveStatus("saved", "Загружен опубликованный профиль");
      } else {
        setSaveStatus("saved", "Готово");
      }

      try { new ResizeObserver(syncHeights).observe($("previewCard")); } catch (e) {}
      window.addEventListener("resize", syncHeights);
    }

    init();
  }
})();
</script>

</body>
</html>
